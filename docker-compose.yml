version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - RAG_TOP_K=5
      - LLM_TIMEOUT=5
      - MAX_CALLS=50
      - OLLAMA_HOST=http://ollama:11434
      - SECRET_KEY=docscanner_prod_secret_key
    volumes:
      - chroma_data:/app/docscanner_rules_db
      - analytics_data:/app/app/feedback_analytics.json
    depends_on:
      - ollama
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

volumes:
  chroma_data:
  analytics_data:
  ollama_data:
