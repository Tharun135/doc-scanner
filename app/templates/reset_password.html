<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password – Doc Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --primary: #00c9b7;
            --accent: #2A3B5A;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--bg-color);
            border-radius: 30px;
            box-shadow: 15px 15px 30px var(--shadow-dark), 
                        -15px -15px 30px var(--shadow-light);
            padding: 40px;
            width: 400px;
            text-align: center;
        }

        h1 { color: var(--accent); margin-bottom: 20px; font-weight: 600; }
        p { font-size: 14px; color: #666; margin-bottom: 25px; line-height: 1.5; }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background-color: var(--bg-color);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), 
                        inset -5px -5px 10px var(--shadow-light);
            outline: none;
            font-family: inherit;
        }

        button {
            border-radius: 20px;
            border: none;
            background-color: var(--accent);
            color: #fff;
            padding: 12px 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 10px var(--shadow-dark), 
                        -4px -4px 10px var(--shadow-light);
            transition: all 0.2s;
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:active { transform: scale(0.95); }

        .email-display { font-weight: 600; color: var(--primary); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Set New Password</h1>
        <p>Verified account:<br><span class="email-display">{{ email }}</span></p>
        <form method="POST">
            <input type="password" name="password" placeholder="New Password" required minlength="8">
            <input type="password" name="confirm_password" placeholder="Confirm Password" required minlength="8">
            <button type="submit">UPDATE PASSWORD</button>
        </form>
    </div>
</body>
</html>
