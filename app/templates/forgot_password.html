<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – Doc Scanner</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #e0e5ec;
            --shadow-light: #ffffff;
            --shadow-dark: #a3b1c6;
            --primary: #00c9b7;
            --accent: #2A3B5A;
        }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        .card {
            background-color: var(--bg-color);
            border-radius: 30px;
            box-shadow: 15px 15px 30px var(--shadow-dark), 
                        -15px -15px 30px var(--shadow-light);
            padding: 40px;
            width: 400px;
            text-align: center;
        }

        h1 { color: var(--accent); margin-bottom: 20px; font-weight: 600; }
        p { font-size: 14px; color: #666; margin-bottom: 30px; line-height: 1.5; }

        input {
            width: 100%;
            padding: 12px 15px;
            margin: 15px 0;
            border: none;
            border-radius: 10px;
            background-color: var(--bg-color);
            box-shadow: inset 5px 5px 10px var(--shadow-dark), 
                        inset -5px -5px 10px var(--shadow-light);
            outline: none;
            font-family: inherit;
        }

        button {
            border-radius: 20px;
            border: none;
            background-color: var(--primary);
            color: #fff;
            padding: 12px 40px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 4px 4px 10px var(--shadow-dark), 
                        -4px -4px 10px var(--shadow-light);
            transition: all 0.2s;
            margin-top: 10px;
        }

        button:active { transform: scale(0.95); }

        .back-link { display: block; margin-top: 25px; color: var(--accent); text-decoration: none; font-size: 13px; font-weight: 400; }
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="card">
        <h1>Forgot Password?</h1>
        <p>No problem! Enter the email associated with your account and we'll help you reset it right away.</p>
        <form method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">SEARCH ACCOUNT</button>
        </form>
        <a href="{{ url_for('auth.login') }}" class="back-link"><i class="fas fa-arrow-left"></i> Back to Login</a>
    </div>
</body>
</html>
